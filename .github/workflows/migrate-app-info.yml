name: Migrar información de la app al HTML

on:
  push:
    paths:
      - .github/workflows/migrate-app-info.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mover contenido al HTML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          faq = Path('faq.html')
          faq_text = faq.read_text(encoding='utf-8')
          faq_question = '''<details id="faq-aion-v-tiene-una-app"><summary>¿AION V tiene una app? ¿Está disponible en Uruguay?</summary><div class="faq-body"><p>Sí, la AION V cuenta con una aplicación oficial en algunos mercados internacionales, desde la que se puede consultar información del vehículo y acceder a determinadas funciones remotas.</p><p>Actualmente, la aplicación no está disponible en Uruguay.</p><p>Tampoco hay información oficial que confirme que vaya a habilitarse en nuestro país en el futuro, ni una fecha anunciada para su posible llegada.</p></div></details>
'''
          faq_anchor = '<details><summary>¿Cómo puedo ayudar a actualizar la guía?</summary>'
          assert faq_anchor in faq_text, 'No se encontró el punto de inserción en FAQ'
          assert 'id="faq-aion-v-tiene-una-app"' not in faq_text, 'La pregunta ya existe en FAQ'
          faq_text = faq_text.replace(faq_anchor, faq_question + faq_anchor, 1)
          faq.write_text(faq_text, encoding='utf-8')

          specs = Path('specs.html')
          specs_text = specs.read_text(encoding='utf-8')
          start = specs_text.index('<section id="tecnologia-conectividad"')
          end = specs_text.index('</section>', start) + len('</section>')
          section = specs_text[start:end]
          assert 'id="app-aion-internacional"' not in section, 'La referencia a la app ya existe en Especificaciones'
          app_card = '''<article class="cost-card" id="app-aion-internacional"><h3>App AION · referencia internacional</h3><p class="section-copy compact">Una captura de la aplicación oficial disponible en algunos mercados internacionales muestra estas funciones:</p><ul class="bullet-list"><li>Consulta de autonomía estimada, nivel de batería y estado del vehículo.</li><li>Controles de bloqueo, ventanillas, baúl, luces y bocina.</li><li>Precalentamiento de batería, ventilación, función “antivirus con un toque” y modo de espera.</li></ul><p class="section-copy compact"><strong>Disponibilidad:</strong> actualmente, la aplicación no está disponible en Uruguay.</p><p class="section-copy compact">La captura no confirma que estas funciones remotas estén habilitadas en las unidades comercializadas localmente.</p></article>'''
          close = section.rfind('</div>\n</section>')
          assert close != -1, 'No se encontró el cierre de Tecnología y conectividad'
          section = section[:close] + app_card + section[close:]
          specs_text = specs_text[:start] + section + specs_text[end:]
          specs.write_text(specs_text, encoding='utf-8')

          nav = Path('mobile-nav.js')
          nav_text = nav.read_text(encoding='utf-8')
          nav_text, removed = re.subn(
              r'\n  const addAppInformation = \(\) => \{.*?\n  \};\n\n  ready',
              '\n  ready',
              nav_text,
              count=1,
              flags=re.S,
          )
          assert removed == 1, 'No se encontró la inyección dinámica'
          nav_text = nav_text.replace('    addAppInformation();\n\n', '', 1)
          assert 'addAppInformation' not in nav_text
          nav.write_text(nav_text, encoding='utf-8')
          PY
      - name: Validar cambios
        shell: bash
        run: |
          node --check mobile-nav.js
          grep -q 'id="faq-aion-v-tiene-una-app"' faq.html
          grep -q 'id="app-aion-internacional"' specs.html
          ! grep -q 'addAppInformation' mobile-nav.js
          git diff --check
      - name: Publicar migración y retirar tarea temporal
        shell: bash
        run: |
          rm .github/workflows/migrate-app-info.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add faq.html specs.html mobile-nav.js .github/workflows/migrate-app-info.yml
          git commit -m "Mueve información de la app al HTML"
          git push
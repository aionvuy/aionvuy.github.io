name: Actualizar postventa GAC

on:
  schedule:
    - cron: '27 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gac-postventas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Consultar fuente oficial de postventa
        run: python scripts/update_gac_postventas.py

      - name: Commit si hubo cambios reales
        run: |
          if git diff --quiet -- data/gac-red.json; then
            echo "Sin cambios reales en data/gac-red.json. No se crea commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gac-red.json
          git commit -m "Actualizar postventa GAC"
          git push

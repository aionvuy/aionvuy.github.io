name: Actualizar datos oficiales

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Consultar fuentes oficiales
        run: |
          python scripts/update_ute_tariffs.py
          python scripts/update_public_data.py
      - name: Publicar cambios si las fuentes se actualizaron
        run: |
          if git diff --quiet -- data/; then
            echo "Sin cambios en los datos"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Actualizar datos oficiales"
          git push

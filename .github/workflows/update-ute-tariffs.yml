name: Actualizar tarifas UTE

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Consultar tarifas oficiales
        run: python scripts/update_ute_tariffs.py
      - name: Publicar cambios si UTE actualizó los precios
        run: |
          if git diff --quiet -- data/ute-tarifas.json; then
            echo "Sin cambios en las tarifas"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ute-tarifas.json
          git commit -m "Actualizar tarifas UTE"
          git push
